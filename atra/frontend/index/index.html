<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <link rel="stylesheet" href="/index/index.css">
</head>
<body>
  <nav>
    <button class="btn-popup" title="Language">
      ?
    </button>
    <div class="dropdown" id="languages-dropdown">
      <button class="toolbar__button dropdown__button-open" title="Language">
        A
      </button>
      <ul class="dropdown__options">
        <li><button class="dropdown__option" data-value="he">עברית</button></li>
        <li><button class="dropdown__option" data-value="en">English</button></li>
        <li><button class="dropdown__option" data-value="ar">العربية</button></li>
      </ul>
    </div>
    <a class="btn-back" href="https://neve-schechter.org.il/">
      <img src="/assets/img/back-arrow.svg" alt="back">
    </a>
  </nav>

  <dialog id="popup" class="popup">
    <div class="popup-inner" dir="{{dir}}">
      <button class="popup-close">X</button>
      <div class="text">{{more_info}}</div>
    </div>
  </dialog>
  
  <div class="bg">
  </div>
  <div class="box">
    <h1>{{title}}</h1>
    <p>{{desc}}</p>
    <div class="tenant-picker">
      <label for="tenant-select" id="tenant-label" data-en="Choose location" data-he="בחר מיקום" data-ar="اختر موقعًا">Choose location</label>
      <div class="tenant-picker__row">
        <input
          type="text"
          id="tenant-search"
          placeholder="Search locations..."
          aria-label="Search locations"
        />
        <div class="tenant-grid" id="tenant-grid">
          <div class="tenant-grid__empty" id="tenant-grid-empty">Loading...</div>
        </div>
      </div>
    </div>
    <div class="links-row">
      <a class="link" id="link-add-dream" href="/{{lang}}/entry">
        {{add_dream}}
      </a>
      <a class="link" id="link-map" href="{{map_base}}/t/{{tenant}}/map?lang={{lang}}">
        {{explore_dreams}}
      </a>
    </div>
    <div class="more-languages">
      <a href="/he" class="for_he">{{for_he}}</a>
      <a href="/en" class="for_en">{{for_en}}</a>
      <a href="/ar" class="for_ar">{{for_ar}}</a>
    </div>
  </div>
  <link rel="stylesheet" href="/assets/scripts/bg.css">
  <script src="/assets/scripts/bg.js"></script>
  <script>
    // open popup
    const btnPopup = document.querySelector('.btn-popup');
    const popup = document.querySelector('#popup');
    btnPopup.addEventListener('click', () => {
      popup.showModal();
    });
    popup.addEventListener('click', (e) => {
      if (e.target === popup) {
        popup.close();
      }
    });
    document.querySelector('.popup-close').addEventListener('click', () => {
      popup.close();
    });
    const tenantGrid = document.getElementById('tenant-grid');
    const tenantGridEmpty = document.getElementById('tenant-grid-empty');
    const tenantSearch = document.getElementById('tenant-search');
    const tenantLabel = document.getElementById('tenant-label');

    const normalizeTenant = (value) => {
      return value
        .trim()
        .toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9-]/g, '');
    };

    const updateTenantOptionLabels = (lang) => {
      const items = tenantGrid.querySelectorAll('.tenant-grid__item');
      items.forEach((item) => {
        const label = item.getAttribute(`data-${lang}`) || item.textContent;
        item.textContent = label;
      });
      if (tenantLabel) {
        tenantLabel.textContent = tenantLabel.getAttribute(`data-${lang}`) || tenantLabel.textContent;
      }
      if (tenantSearch) {
        const placeholderMap = {
          en: 'Search locations...',
          he: 'חפש מיקום...',
          ar: 'ابحث عن موقع...'
        };
        tenantSearch.placeholder = placeholderMap[lang] || tenantSearch.placeholder;
      }
    };

    const initLang = document.documentElement.getAttribute('lang') || 'he';
    updateTenantOptionLabels(initLang);

    const setTenant = async (tenant) => {
      if (!tenant) {
        return;
      }
      try {
        await fetch('/api/tenant', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tenant })
        });
      } catch {
        // Ignore failures
      }
    };

    let selectedTenant = '';

    const languageButtons = document.querySelectorAll('.dropdown__option');
    languageButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const lang = button.getAttribute('data-value');
        if (lang) {
          updateTenantOptionLabels(lang);
        }
      });
    });

    let allLocations = [];

    const populateLocations = (locations, lang) => {
      tenantGrid.innerHTML = '';
      if (!locations.length) {
        tenantGridEmpty.textContent = lang === 'he' ? 'אין מיקומים זמינים' : lang === 'ar' ? 'لا توجد مواقع' : 'No locations available';
        tenantGrid.appendChild(tenantGridEmpty);
        return;
      }
      locations.forEach((location) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'tenant-grid__item';
        button.dataset.key = location.key;
        button.dataset.en = location.en || location.key;
        button.dataset.he = location.he || location.en || location.key;
        button.dataset.ar = location.ar || location.en || location.key;
        button.textContent = location[lang] || location.en || location.key;
        if (location.key === selectedTenant) {
          button.classList.add('is-selected');
        }
        button.addEventListener('click', () => {
          selectedTenant = location.key;
          setTenant(selectedTenant);
          tenantGrid.querySelectorAll('.tenant-grid__item').forEach((el) => {
            el.classList.toggle('is-selected', el.dataset.key === selectedTenant);
          });
        });
        tenantGrid.appendChild(button);
      });
      updateTenantOptionLabels(lang);
    };

    const loadLocations = async () => {
      const lang = document.documentElement.getAttribute('lang') || 'he';
      try {
        const response = await fetch('/api/locations');
        const data = await response.json();
        allLocations = data.locations || [];
        populateLocations(allLocations, lang);
      } catch (error) {
        populateLocations([], lang);
      }
    };

    loadLocations();

    const filterLocations = () => {
      const lang = document.documentElement.getAttribute('lang') || 'he';
      const query = (tenantSearch?.value || '').trim().toLowerCase();
      if (!query) {
        populateLocations(allLocations, lang);
        return;
      }
      const filtered = allLocations.filter((location) => {
        return (
          (location.key || '').toLowerCase().includes(query) ||
          (location.en || '').toLowerCase().includes(query) ||
          (location.he || '').toLowerCase().includes(query) ||
          (location.ar || '').toLowerCase().includes(query)
        );
      });
      populateLocations(filtered, lang);
    };

    if (tenantSearch) {
      tenantSearch.addEventListener('input', filterLocations);
    }

    const linkAddDream = document.getElementById('link-add-dream');
    const linkMap = document.getElementById('link-map');

    const handleNavigate = async (event) => {
      event.preventDefault();
      const link = event.currentTarget;
      const lang = document.documentElement.getAttribute('lang') || 'he';
      const tenant = selectedTenant;
      if (!tenant) {
        alert(lang === 'he' ? 'בחר מיקום לפני שממשיכים' : lang === 'ar' ? 'اختر موقعًا قبل المتابعة' : 'Choose a location before continuing');
        return;
      }
      await setTenant(tenant);
      if (link === linkMap) {
        window.location.href = `{{map_base}}/t/${tenant}/map?lang=${lang}`;
      } else {
        window.location.href = `/${lang}/entry`;
      }
    };

    if (linkAddDream) {
      linkAddDream.addEventListener('click', handleNavigate);
    }
    if (linkMap) {
      linkMap.addEventListener('click', handleNavigate);
    }
  </script>
</body>
</html>
