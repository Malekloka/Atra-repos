<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <link rel="stylesheet" href="/input/entry/entry.css">
  <script
    src="https://js.sentry-cdn.com/a8e57c805c3c65e8cfd9fab481dc604f.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="/assets/js/trace.js"></script>
</head>
<body>
  <nav>
    <a class="btn-back" href="/{{lang}}/">
      <img src="/assets/img/back-arrow.svg" alt="back">
    </a>
    <div class="dropdown" id="languages-dropdown">
      <button class="toolbar__button dropdown__button-open" title="Language">
        A
      </button>
      <ul class="dropdown__options">
        <li><button class="dropdown__option" data-value="he">עברית</button></li>
        <li><button class="dropdown__option" data-value="en">English</button></li>
        <li><button class="dropdown__option" data-value="ar">العربية</button></li>
      </ul>
    </div>
  </nav>

  <div class="bg"></div>
  <div class="box">
    <h1>{{title}}</h1>
    <p>{{description}}</p>
    <div class="links-row">
      <form method="post" action="/{{lang}}/new">
        <input type="hidden" name="type" value="record">
        <button type="submit" class="link">
          <img src="/assets/img/mic.svg" alt="">
          {{record}}
        </button>
      </form>

      <form method="post" action="/{{lang}}/new">
        <input type="hidden" name="type" value="write">
        <button type="submit" class="link">
          <img src="/assets/img/pencil.svg" alt="">
          {{write}}
        </button>
      </form>
    </div>
  </div>
  <link rel="stylesheet" href="/assets/scripts/bg.css">
  <script src="/assets/scripts/bg.js"></script>
</body>
</html>
