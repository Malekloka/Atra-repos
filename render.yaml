services:
  - type: web
    name: atra
    env: node
    plan: free
    rootDir: atra
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: DB_NAME
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: PLAY_WITH_DREAMS_URL
        sync: false

  - type: web
    name: play-with-dreams
    env: node
    plan: free
    rootDir: play-with-dreams
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: DB_NAME
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ATRA_BASE_URL
        sync: false
